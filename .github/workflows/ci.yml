name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Generate Prisma Client
        run: npm run generate
      - name: TypeScript check (frontend)
        run: npx tsc -p frontend/tsconfig.json --noEmit
      - name: Build frontend
        run: npm run build

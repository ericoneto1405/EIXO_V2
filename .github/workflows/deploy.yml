name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    name: CI — Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci --include=dev
      - name: Generate Prisma Client
        run: npm run generate
      - name: TypeScript check (frontend)
        run: npx tsc -p frontend/tsconfig.json --noEmit
      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy → Produção
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /var/www/eixo

            echo "▶ Preservando server/.env.production..."
            cp -f server/.env.production /tmp/.env.production.bak 2>/dev/null || true

            echo "▶ Atualizando código..."
            git fetch origin main
            git reset --hard origin/main

            echo "▶ Restaurando server/.env.production..."
            cp -f /tmp/.env.production.bak server/.env.production 2>/dev/null || true

            echo "▶ Carregando variáveis de ambiente..."
            set -a
            source server/.env.production
            set +a

            echo "▶ Instalando dependências (root workspace)..."
            rm -rf node_modules package-lock.json
            npm install --include=dev

            echo "▶ Aplicando migrações do banco..."
            npx prisma migrate deploy --schema server/prisma/schema.prisma
            npx prisma generate --schema server/prisma/schema.prisma

            echo "▶ Build do frontend..."
            npm run build

            echo "▶ Reiniciando servidor (delete + start para garantir reload do .env.production)..."
            pm2 delete eixo-server >/dev/null 2>&1 || true
            pm2 start ecosystem.config.cjs
            pm2 save --force

            echo "▶ Health check..."
            sleep 3
            if curl -fsS --max-time 10 http://127.0.0.1:3000/health >/dev/null 2>&1; then
              echo "Health OK"
            else
              echo "WARNING: Health check falhou — verifique pm2 logs"
            fi

            echo "Deploy concluído."

      - name: Verificar uptime
        run: |
          sleep 5
          HTTP_CODE=$(curl -L -s -o /dev/null -w "%{http_code}" https://eixo.agr.br || true)
          if [[ "$HTTP_CODE" =~ ^2|3 ]]; then
            echo "Site no ar: https://eixo.agr.br (HTTP $HTTP_CODE)"
          else
            echo "WARNING: Site retornou HTTP $HTTP_CODE"
          fi

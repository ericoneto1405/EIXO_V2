<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="white" rx="10"/>
  <!-- barra cinza: diagonal \ (pernas esquerdas) -->
  <rect x="27" y="-4" width="10" height="72" fill="#595959" rx="4"
        transform="rotate(-38 32 32)"/>
  <!-- barra verde: diagonal / (pernas direitas) — por cima -->
  <rect x="27" y="-4" width="10" height="72" fill="#72b800" rx="4"
        transform="rotate(38 32 32)"/>
</svg>
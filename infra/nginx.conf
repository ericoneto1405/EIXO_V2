# ─── EIXO — Nginx + HTTPS para eixo.agr.br ───────────────────────────────────
# Localização: /etc/nginx/sites-available/eixo
# Ativar: sudo ln -s /etc/nginx/sites-available/eixo /etc/nginx/sites-enabled/
# Certificado: sudo certbot --nginx -d eixo.agr.br -d www.eixo.agr.br

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name eixo.agr.br www.eixo.agr.br;
    return 301 https://eixo.agr.br$request_uri;
}

# Redireciona www → sem www
server {
    listen 443 ssl;
    server_name www.eixo.agr.br;

    ssl_certificate     /etc/letsencrypt/live/eixo.agr.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eixo.agr.br/privkey.pem;

    return 301 https://eixo.agr.br$request_uri;
}

# Servidor principal
server {
    listen 443 ssl;
    server_name eixo.agr.br;

    # ── Certificado Let's Encrypt (gerado pelo certbot) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/eixo.agr.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eixo.agr.br/privkey.pem;

    # ── Segurança TLS ─────────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Headers de segurança ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upload de arquivos (planilhas até 10MB) ───────────────────────────────
    client_max_body_size 10M;

    # ── Frontend (React build estático) ──────────────────────────────────────
    # ATENÇÃO: ajuste o caminho abaixo para onde o projeto está no servidor
    root /var/www/eixo/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API (Node.js na porta 3001) ───────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Arquivos estáticos do frontend — cache agressivo ─────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/eixo_access.log;
    error_log  /var/log/nginx/eixo_error.log;
}

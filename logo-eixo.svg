<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 882 300" width="882" height="300">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d8d8d8"/>
      <stop offset="40%"  stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <linearGradient id="green-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5ee84a"/>
      <stop offset="50%"  stop-color="#28b416"/>
      <stop offset="100%" stop-color="#1a8a0a"/>
    </linearGradient>
    <!-- shadow filter for slight depth -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background transparent -->

  <!-- E -->
  <path d="M 50,30 H 62 Q 82,30 82,50 V 250 Q 82,270 62,270 H 50 Q 30,270 30,250 V 50 Q 30,30 50,30 Z M 50,30 H 225 Q 245,30 245,50 V 62 Q 245,82 225,82 H 50 Q 30,82 30,62 V 50 Q 30,30 50,30 Z M 50,124 H 195 Q 215,124 215,144 V 156 Q 215,176 195,176 H 50 Q 30,176 30,156 V 144 Q 30,124 50,124 Z M 50,218 H 225 Q 245,218 245,238 V 250 Q 245,270 225,270 H 50 Q 30,270 30,250 V 238 Q 30,218 50,218 Z" fill="url(#silver)" filter="url(#shadow)"/>

  <!-- I -->
  <path d="M 288,30 H 308 Q 328,30 328,50 V 250 Q 328,270 308,270 H 288 Q 268,270 268,250 V 50 Q 268,30 288,30 Z" fill="url(#silver)" filter="url(#shadow)"/>

  <!-- X: green diagonal (╱) first, silver (╲) on top -->
  <rect x="303.21" y="124.0" width="325.58" height="52" rx="20"
        fill="url(#green-grad)" filter="url(#shadow)"
        transform="rotate(-47.49 466 150)"/>
  <rect x="303.21" y="124.0" width="325.58" height="52" rx="20"
        fill="url(#silver)" filter="url(#shadow)"
        transform="rotate(47.49 466 150)"/>

  <!-- O (evenodd for the hole) -->
  <path d="M 644,30 H 782 Q 822,30 822,70 V 230 Q 822,270 782,270 H 644 Q 604,270 604,230 V 70 Q 604,30 644,30 Z M 664,82 H 762 Q 770,82 770,90 V 210 Q 770,218 762,218 H 664 Q 656,218 656,210 V 90 Q 656,82 664,82 Z" fill-rule="evenodd" fill="url(#silver)" filter="url(#shadow)"/>

</svg>